<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1500, height=500">
  <title>حفصة – OG Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1500px; height: 500px; overflow: hidden;
      background-color: #0E2B1E;
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23DAA520'%3E%3Cpolygon points='40,2 52,14 68,14 68,28 80,40 68,52 68,66 52,66 40,78 28,66 12,66 12,52 0,40 12,28 12,14 28,14' fill='none' stroke='%23DAA520' stroke-width='1.5'/%3E%3C/g%3E%3C/svg%3E");
      background-size: 80px 80px;
      font-family: 'Scheherazade New', 'Amiri', serif;
      direction: rtl;
      display: flex;
      align-items: center;
    }
    .border-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: repeating-linear-gradient(90deg,
        #1B4332 0px, #1B4332 20px,
        #DAA520 20px, #DAA520 22px,
        #1B4332 22px, #1B4332 42px,
        #B8860B 42px, #B8860B 44px
      );
    }
    .border-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 8px;
      background: repeating-linear-gradient(90deg,
        #1B4332 0px, #1B4332 20px,
        #DAA520 20px, #DAA520 22px,
        #1B4332 22px, #1B4332 42px,
        #B8860B 42px, #B8860B 44px
      );
    }
    .content-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 50px 60px 50px 50px;
    }
    .eyebrow {
      font-family: 'Scheherazade New', serif;
      font-size: 18px;
      font-weight: 400;
      color: rgba(200,230,210,0.75);
      position: relative;
      margin-bottom: 8px;
    }
    .eyebrow::before {
      content: '— ';
      color: #DAA520;
      font-weight: 600;
    }
    .headline {
      font-family: 'Amiri', serif;
      font-size: 36px;
      font-weight: 700;
      color: #F5E6B8;
      line-height: 1.3;
      max-width: 850px;
    }
    .headline .gold {
      color: #DAA520;
    }
    .bullets {
      display: flex;
      gap: 20px;
      margin-top: 16px;
    }
    .bullet-item {
      font-family: 'Scheherazade New', serif;
      font-size: 16px;
      font-weight: 600;
      color: #F5E6B8;
    }
    .bullet-item::before {
      content: '• ';
      color: #DAA520;
      font-weight: 700;
    }
    .divider-vertical {
      width: 1px;
      height: 300px;
      background: linear-gradient(to bottom, transparent, rgba(218,165,32,0.5), transparent);
    }
    .logo-zone {
      width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .ring {
      width: 140px; height: 140px;
      border-radius: 50%;
      border: 3px solid #DAA520;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(27,67,50,0.6);
      position: relative;
    }
    .ring::before {
      content: '';
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      border: 1px solid rgba(218,165,32,0.3);
    }
    .ring-glyph {
      font-family: 'Amiri', serif;
      font-size: 54px;
      font-weight: 700;
      color: #DAA520;
      line-height: 1;
    }
    .logo-title {
      font-family: 'Amiri', serif;
      font-size: 40px;
      font-weight: 700;
      color: #F5E6B8;
      margin-top: 12px;
      line-height: 1.1;
    }
    .logo-sub {
      font-family: 'Scheherazade New', serif;
      font-size: 14px;
      font-weight: 600;
      color: rgba(218,165,32,0.5);
      letter-spacing: 6px;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="border-top"></div>
  <div class="content-zone">
    <div class="eyebrow">شبكة إسلامية للتعارف بقصد الزواج</div>
    <div class="headline">
      المنصة التي تضع <span class="gold">ولي الأمر</span><br>
      في صلب عملية التعارف
    </div>
    <div class="bullets">
      <span class="bullet-item">ولي الأمر</span>
      <span class="bullet-item">خصوصية</span>
      <span class="bullet-item">شريعة</span>
    </div>
  </div>
  <div class="divider-vertical"></div>
  <div class="logo-zone">
    <div class="ring">
      <div class="ring-glyph">حـ</div>
    </div>
    <div class="logo-title">حفصة</div>
    <div class="logo-sub">H A F S A</div>
  </div>
  <div class="border-bottom"></div>
</body>
</html>
