<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=800">
  <title>حفصة – OG Square</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 800px; height: 800px; overflow: hidden;
      background-color: #0E2B1E;
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23DAA520'%3E%3Cpolygon points='40,2 52,14 68,14 68,28 80,40 68,52 68,66 52,66 40,78 28,66 12,66 12,52 0,40 12,28 12,14 28,14' fill='none' stroke='%23DAA520' stroke-width='1.5'/%3E%3C/g%3E%3C/svg%3E");
      background-size: 80px 80px;
      font-family: 'Scheherazade New', 'Amiri', serif;
      direction: rtl;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .frame {
      width: 720px; height: 720px;
      border: 2px solid #DAA520;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }
    .frame::before, .frame::after {
      content: '';
      position: absolute;
      width: 30px; height: 30px;
      border-color: #DAA520;
      border-style: solid;
    }
    .frame::before {
      top: 10px; right: 10px;
      border-top-width: 2px; border-right-width: 2px;
      border-bottom: none; border-left: none;
    }
    .frame::after {
      bottom: 10px; left: 10px;
      border-bottom-width: 2px; border-left-width: 2px;
      border-top: none; border-right: none;
    }
    .ornament {
      font-size: 28px;
      color: rgba(218,165,32,0.4);
      letter-spacing: 12px;
      margin-bottom: 20px;
    }
    .ring {
      width: 160px; height: 160px;
      border-radius: 50%;
      border: 3px solid #DAA520;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(27,67,50,0.6);
      position: relative;
    }
    .ring::before {
      content: '';
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      border: 1px solid rgba(218,165,32,0.3);
    }
    .ring-glyph {
      font-family: 'Amiri', serif;
      font-size: 64px;
      font-weight: 700;
      color: #DAA520;
      line-height: 1;
    }
    .main-title {
      font-family: 'Amiri', serif;
      font-size: 80px;
      font-weight: 700;
      color: #F5E6B8;
      line-height: 1.1;
      margin-top: 20px;
    }
    .main-title-english {
      font-family: 'Scheherazade New', serif;
      font-size: 18px;
      font-weight: 600;
      color: rgba(218,165,32,0.5);
      letter-spacing: 8px;
      margin-top: 4px;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: rgba(218,165,32,0.5);
      font-size: 16px;
    }
    .divider-line {
      width: 60px;
      height: 1px;
      background: rgba(218,165,32,0.3);
    }
    .tagline {
      font-family: 'Scheherazade New', serif;
      font-size: 20px;
      font-weight: 400;
      color: rgba(200,230,210,0.85);
      line-height: 1.7;
      text-align: center;
    }
    .tagline-em {
      color: #DAA520;
      font-weight: 700;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(45,106,79,0.5);
      border: 1px solid rgba(218,165,32,0.3);
      padding: 8px 22px;
      margin-top: 18px;
      font-family: 'Scheherazade New', serif;
      font-size: 16px;
      font-weight: 600;
      color: #F5E6B8;
    }
    .pill .check {
      color: #2D6A4F;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="ornament">✦ ❖ ✦</div>
    <div class="ring">
      <div class="ring-glyph">حـ</div>
    </div>
    <div class="main-title">حفصة</div>
    <div class="main-title-english">H A F S A</div>
    <div class="divider">
      <span class="divider-line"></span>
      <span>◆</span>
      <span class="divider-line"></span>
    </div>
    <div class="tagline">
      شبكة إسلامية للتعارف بقصد الزواج<br>
      بإشراف <span class="tagline-em">ولي الأمر</span>
    </div>
    <div class="pill"><span class="check">✓</span> وفق الضوابط الشرعية</div>
  </div>
</body>
</html>
